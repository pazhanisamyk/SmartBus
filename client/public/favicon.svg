<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Royal Blue -> Indigo -> Cyan -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="50%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    
    <!-- Inner Pin/Glow Gradient -->
    <linearGradient id="pin-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
    
    <!-- Accent Shadow for Depth -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.3" />
    </filter>
    
    <!-- Neon Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Base App Icon Card (Squircle background) -->
  <rect x="32" y="32" width="448" height="448" rx="120" fill="url(#bg-grad)" filter="url(#shadow)" />
  
  <!-- Decorative Radar Waves / Tracking Paths -->
  <circle cx="256" cy="236" r="165" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="5" stroke-dasharray="14 10" />
  <circle cx="256" cy="236" r="125" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="3" />
  
  <!-- GPS Map Pin (Premium White/Slate Pin Body) -->
  <path d="M 256 80 C 170 80 100 150 100 236 C 100 330 256 432 256 432 C 256 432 412 330 412 236 C 412 150 342 80 256 80 Z" 
        fill="url(#pin-grad)" filter="url(#shadow)" />
        
  <!-- Concentric Slate Circle inside the Map Pin -->
  <circle cx="256" cy="236" r="76" fill="#0f172a" />
  
  <!-- Stylized Modern Front-Facing Bus -->
  <!-- Wheels -->
  <rect x="214" y="282" width="16" height="10" rx="3" fill="#020617" />
  <rect x="282" y="282" width="16" height="10" rx="3" fill="#020617" />
  <rect x="200" y="278" width="112" height="6" rx="2" fill="#020617" />

  <!-- Bus Body -->
  <rect x="206" y="190" width="100" height="92" rx="14" fill="#1e293b" />
  
  <!-- Windshield -->
  <rect x="214" y="198" width="84" height="36" rx="6" fill="#38bdf8" />
  
  <!-- Windshield Reflection Highlight -->
  <path d="M 218 198 L 256 198 L 238 234 L 214 234 Z" fill="#ffffff" fill-opacity="0.2" />
  
  <!-- Destination Board -->
  <rect x="224" y="202" width="64" height="10" rx="2" fill="#020617" />
  <rect x="228" y="204" width="4" height="6" rx="1" fill="#eab308" />
  <rect x="235" y="204" width="10" height="6" rx="1" fill="#eab308" />
  <rect x="248" y="204" width="24" height="6" rx="1" fill="#eab308" />
  
  <!-- Headlights with Neon Glow -->
  <rect x="212" y="252" width="16" height="8" rx="2" fill="#ffffff" filter="url(#glow)" />
  <rect x="284" y="252" width="16" height="8" rx="2" fill="#ffffff" filter="url(#glow)" />
  
  <!-- Inner Grille/Bumper details -->
  <rect x="234" y="252" width="44" height="12" rx="3" fill="#0f172a" />
  <line x1="238" y1="256" x2="274" y2="256" stroke="#334155" stroke-width="2" stroke-linecap="round" />
  <line x1="238" y1="260" x2="274" y2="260" stroke="#334155" stroke-width="2" stroke-linecap="round" />
  
  <!-- Indicator Lights -->
  <circle cx="210" cy="244" r="3" fill="#f97316" />
  <circle cx="302" cy="244" r="3" fill="#f97316" />
  
  <!-- Rearview Mirrors -->
  <path d="M 206 208 C 196 208 192 198 194 192" fill="none" stroke="#1e293b" stroke-width="4" stroke-linecap="round" />
  <rect x="189" y="186" width="6" height="14" rx="2" fill="#0f172a" />
  
  <path d="M 306 208 C 316 208 320 198 318 192" fill="none" stroke="#1e293b" stroke-width="4" stroke-linecap="round" />
  <rect x="317" y="186" width="6" height="14" rx="2" fill="#0f172a" />
  
  <!-- Glowing GPS location marker above the bus -->
  <circle cx="256" cy="136" r="10" fill="#ef4444" filter="url(#glow)" />
  <circle cx="256" cy="136" r="4" fill="#ffffff" />
</svg>
